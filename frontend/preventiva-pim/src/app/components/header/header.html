<header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 sticky top-0 z-10">
  
  <div class="flex-1 max-w-xl">
    <div class="relative group">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <img src="https://unpkg.com/lucide-static@latest/icons/search.svg" class="w-4 h-4 text-gray-400 group-focus-within:text-blue-500 transition-colors">
      </div>
      <input type="text" 
             placeholder="Search industrial assets, logs, or reports..." 
             class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-lg bg-gray-50 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
    </div>
  </div>

  <div class="flex items-center gap-6">
    
    <button class="relative p-2 text-gray-400 hover:bg-gray-100 rounded-full transition-colors group">
      <img src="https://unpkg.com/lucide-static@latest/icons/bell.svg" class="w-5 h-5">
      <span class="absolute top-2 right-2.5 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-white"></span>
    </button>

    <button title="Central de Ajuda" class="p-2 text-gray-400 hover:bg-gray-100 rounded-full transition-colors">
      <img src="https://unpkg.com/lucide-static@latest/icons/help-circle.svg" class="w-5 h-5">
    </button>

    <div class="h-8 w-[1px] bg-gray-200"></div>

    <div class="text-right hidden sm:block">
      <p class="text-[10px] font-bold text-[#001a33] uppercase leading-none">Sector 04</p>
      <p class="text-[9px] text-gray-400 uppercase tracking-tighter">Plant A - Manaus</p>
    </div>

  </div>
</header>
